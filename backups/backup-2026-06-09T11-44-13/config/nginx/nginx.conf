events {
    worker_connections 1024;
}

http {
    upstream shepherd_api {
        server shepherd-api:3000;
    }

    upstream mongo_express {
        server mongo-express:8081;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream kibana {
        server kibana:5601;
    }

    # API 服务
    server {
        listen 80;
        server_name api.shepherd.local;

        location / {
            proxy_pass http://shepherd_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # MongoDB 管理界面
    server {
        listen 80;
        server_name mongo.shepherd.local;
        auth_basic "MongoDB Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://mongo_express;
        }
    }

    # Grafana 监控
    server {
        listen 80;
        server_name grafana.shepherd.local;

        location / {
            proxy_pass http://grafana;
        }
    }

    # Kibana 日志
    server {
        listen 80;
        server_name kibana.shepherd.local;
        auth_basic "Kibana Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://kibana;
        }
    }

    # 默认服务器 - 返回静态页面
    server {
        listen 80 default_server;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}