apiVersion: apps/v1
kind: Deployment
metadata:
  name: shepherd-api
  labels:
    app: shepherd-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shepherd-api
  template:
    metadata:
      labels:
        app: shepherd-api
    spec:
      containers:
      - name: shepherd-api
        image: shepherd-architecture:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: shepherd-secrets
              key: mongodb-uri
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: shepherd-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: shepherd-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shepherd-api-service
spec:
  selector:
    app: shepherd-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shepherd-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.shepherd.local
    secretName: shepherd-tls
  rules:
  - host: api.shepherd.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shepherd-api-service
            port:
              number: 80